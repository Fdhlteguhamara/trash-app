<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Trash App</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Style -->
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #map {
      height: 60vh;
      width: 100%;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-top: -50px;
      position: relative;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #27ae60;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #219150;
    }
  </style>
</head>

<body>

<header>🚮 Trash Reporting System</header>

<div id="map"></div>

<div class="container">
  <div class="card">
    <h3>Laporkan Sampah</h3>

    <input type="text" id="description" placeholder="Deskripsi sampah">

    <button onclick="submitReport()">Kirim Laporan</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([-6.2, 106.8], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let marker;

  map.on('click', function(e) {
    if (marker) {
      map.removeLayer(marker);
    }

    marker = L.marker(e.latlng).addTo(map);
    window.selectedLat = e.latlng.lat;
    window.selectedLng = e.latlng.lng;
  });

  async function submitReport() {
    const description = document.getElementById('description').value;

    if (!window.selectedLat) {
      alert("Klik lokasi di peta dulu!");
      return;
    }

    const res = await fetch('/api/reports', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description,
        lat: window.selectedLat,
        lng: window.selectedLng
      })
    });

    alert("Laporan terkirim!");
  }
</script>

</body>
</html>
